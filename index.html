<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 확인</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f8f5; color: #2c2c2a; min-height: 100vh; padding: 1.5rem; transition: background 0.2s, color 0.2s; }
  body.dark { background: #1a1a1a; color: #e8e6df; }

  /* 업데이트 배너 */
  .update-banner { background: #185fa5; color: #fff; padding: 10px 1.5rem; margin: -1.5rem -1.5rem 1.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .update-banner a { color: #fff; font-weight: 500; text-decoration: underline; margin-left: 12px; }
  .update-banner.hidden { display: none; }

  /* 버전 히스토리 팝업 */
  .ver-modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 9998; display: none; }
  .ver-modal-bg.open { display: flex; }
  .ver-modal { background: #fff; border-radius: 16px; padding: 1.75rem; width: 460px; max-width: 92vw; max-height: 80vh; overflow-y: auto; }
  body.dark .ver-modal { background: #242424; }
  .ver-modal h2 { font-size: 17px; font-weight: 500; margin-bottom: 1rem; }
  .ver-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .ver-table th { text-align: left; color: #888780; font-weight: 400; padding: 6px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  body.dark .ver-table th { border-color: rgba(255,255,255,0.08); }
  .ver-table td { padding: 8px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.05); color: #2c2c2a; vertical-align: top; line-height: 1.6; }
  body.dark .ver-table td { border-color: rgba(255,255,255,0.05); color: #e8e6df; }
  .ver-table tr:last-child td { border-bottom: none; }
  .ver-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: #e6f1fb; color: #185fa5; font-weight: 500; white-space: nowrap; }
  .ver-close { margin-top: 1.25rem; width: 100%; background: transparent; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 8px; font-size: 13px; color: #888780; }
  body.dark .ver-close { border-color: rgba(255,255,255,0.12); }

  /* Name Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .modal { background: #fff; border-radius: 16px; padding: 2rem; width: 340px; max-width: 90vw; }
  body.dark .modal { background: #242424; }
  .modal h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: #888780; margin-bottom: 1.25rem; }
  .modal input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.15); background: #f9f8f5; font-size: 15px; color: #2c2c2a; font-family: inherit; outline: none; margin-bottom: 12px; }
  body.dark .modal input { background: #1a1a1a; color: #e8e6df; border-color: rgba(255,255,255,0.15); }
  .modal-btn { width: 100%; background: #185fa5; border: none; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 500; color: #fff; cursor: pointer; }

  /* Tab */
  .tab-switch { display: flex; margin-bottom: 1.5rem; background: #ece9e2; border-radius: 12px; padding: 4px; width: fit-content; }
  body.dark .tab-switch { background: #2e2e2e; }
  .tab-btn { padding: 8px 22px; border-radius: 9px; border: none; font-size: 14px; font-weight: 400; color: #888780; background: transparent; cursor: pointer; font-family: inherit; transition: all 0.18s; }
  .tab-btn.active { background: #fff; font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  body.dark .tab-btn.active { background: #3a3a3a; color: #e8e6df; }
  .tab-btn.day.active { color: #185fa5; }
  .tab-btn.night.active { color: #533ab7; }
  .tab-btn.history.active { color: #3b6d11; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
  .header-left h1 { font-size: 24px; font-weight: 500; }
  .header-left .subdate { font-size: 13px; color: #888780; margin-top: 4px; }
  .header-left .username-tag { font-size: 13px; color: #185fa5; margin-top: 4px; cursor: pointer; }
  .header-left .username-tag:hover { text-decoration: underline; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .version-info { font-size: 11px; color: #888780; text-align: right; }
  .version-info a { color: #185fa5; text-decoration: none; font-size: 11px; }
  .version-info a:hover { text-decoration: underline; }
  .header-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  button { cursor: pointer; font-family: inherit; }
  .btn-dark { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 6px 14px; font-size: 13px; color: #2c2c2a; }
  body.dark .btn-dark { background: #242424; border-color: rgba(255,255,255,0.12); color: #e8e6df; }
  .btn-add-day { background: #185fa5; border: none; border-radius: 8px; padding: 6px 16px; font-size: 13px; font-weight: 500; color: #fff; }
  .btn-add-night { background: #533ab7; border: none; border-radius: 8px; padding: 6px 16px; font-size: 13px; font-weight: 500; color: #fff; }
  .btn-reset { background: transparent; border: 0.5px solid rgba(220,60,60,0.35); border-radius: 8px; padding: 6px 14px; font-size: 13px; color: #a32d2d; }
  .btn-reset:hover { background: #fcebeb; }
  body.dark .btn-reset { color: #f09595; border-color: rgba(240,149,149,0.35); }

  /* Add Form */
  .add-form { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: none; }
  body.dark .add-form { background: #242424; border-color: rgba(255,255,255,0.1); }
  .add-form.open { display: block; }
  .add-form label { font-size: 13px; color: #888780; display: block; margin-bottom: 6px; }
  .add-form input { width: 100%; padding: 8px 10px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.12); background: #f9f8f5; font-size: 14px; color: #2c2c2a; font-family: inherit; outline: none; }
  body.dark .add-form input { background: #1a1a1a; color: #e8e6df; border-color: rgba(255,255,255,0.1); }
  .add-form-btns { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
  .btn-cancel { background: transparent; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 6px 14px; font-size: 13px; color: #888780; }
  body.dark .btn-cancel { border-color: rgba(255,255,255,0.12); }
  .btn-save-day { background: #185fa5; border: none; border-radius: 8px; padding: 6px 18px; font-size: 13px; font-weight: 500; color: #fff; }
  .btn-save-night { background: #533ab7; border: none; border-radius: 8px; padding: 6px 18px; font-size: 13px; font-weight: 500; color: #fff; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.25rem; }
  .stat-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 1rem; }
  body.dark .stat-card { background: #242424; border-color: rgba(255,255,255,0.1); }
  .stat-label { font-size: 12px; color: #888780; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 500; }

  /* Progress */
  .progress-wrap { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  body.dark .progress-wrap { background: #242424; border-color: rgba(255,255,255,0.1); }
  .progress-header { display: flex; justify-content: space-between; font-size: 13px; color: #888780; margin-bottom: 8px; }
  .progress-header .pct { font-weight: 500; color: #2c2c2a; }
  body.dark .progress-header .pct { color: #e8e6df; }
  .progress-bar-bg { background: #f1efe8; border-radius: 99px; height: 8px; overflow: hidden; }
  body.dark .progress-bar-bg { background: #333; }
  .progress-bar { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .bar-day { background: #1d9e75; }
  .bar-night { background: #7f77dd; }

  /* Filters */
  .filters { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { padding: 5px 16px; border-radius: 99px; font-size: 13px; border: 0.5px solid rgba(0,0,0,0.1); background: #fff; color: #888780; font-family: inherit; }
  body.dark .filter-btn { background: #242424; border-color: rgba(255,255,255,0.1); }
  .filter-btn.active-day { background: #185fa5; color: #fff; border-color: #185fa5; font-weight: 500; }
  .filter-btn.active-night { background: #533ab7; color: #fff; border-color: #533ab7; font-weight: 500; }

  /* Todo */
  .todo-list { display: flex; flex-direction: column; gap: 6px; }
  .todo-item { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 0.8rem 1.1rem; display: flex; align-items: flex-start; gap: 12px; transition: opacity 0.15s, border-color 0.15s; }
  body.dark .todo-item { background: #242424; border-color: rgba(255,255,255,0.1); }
  .todo-item.dragging { opacity: 0.4; }
  .todo-item.drag-over-day { border-color: #185fa5; }
  .todo-item.drag-over-night { border-color: #533ab7; }
  .drag-handle { color: #888780; cursor: grab; flex-shrink: 0; padding-top: 2px; }
  .todo-num { font-size: 12px; color: #888780; min-width: 20px; text-align: center; flex-shrink: 0; padding-top: 2px; }
  .todo-main { flex: 1; min-width: 0; }
  .todo-text { font-size: 14px; color: #2c2c2a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: text; padding-top: 2px; }
  body.dark .todo-text { color: #e8e6df; }
  .todo-text.done { color: #888780; text-decoration: line-through; }
  .todo-text-input { width: 100%; padding: 3px 7px; border-radius: 6px; border: 0.5px solid #185fa5; background: #f9f8f5; font-size: 14px; color: #2c2c2a; font-family: inherit; outline: none; }
  body.dark .todo-text-input { background: #1a1a1a; color: #e8e6df; }
  .todo-names { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
  .name-tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; }
  .name-tag-prog { background: #faeeda; color: #854f0b; }
  .name-tag-done { background: #e1f5ee; color: #0f6e56; }
  .name-tag-done-night { background: #eeedfe; color: #3c3489; }

  /* Checkboxes */
  .checkboxes { display: flex; gap: 14px; flex-shrink: 0; align-items: flex-start; padding-top: 1px; }
  .chk-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .chk-wrap span { font-size: 10px; color: #888780; }
  .chk-box { width: 20px; height: 20px; border-radius: 5px; border: 2px solid rgba(0,0,0,0.15); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  body.dark .chk-box { border-color: rgba(255,255,255,0.2); }
  .chk-prog { border-color: #ef9f27 !important; background: #ef9f27; }
  .chk-done-day { border-color: #1d9e75 !important; background: #1d9e75; }
  .chk-done-night { border-color: #7f77dd !important; background: #7f77dd; }
  .chk-box.disabled { opacity: 0.4; cursor: not-allowed; }
  .status-badge { font-size: 11px; padding: 2px 10px; border-radius: 99px; flex-shrink: 0; min-width: 44px; text-align: center; margin-top: 2px; }
  .badge-미확인 { background: #f1efe8; color: #5f5e5a; border: 0.5px solid #b4b2a9; }
  .badge-진행 { background: #faeeda; color: #854f0b; border: 0.5px solid #ef9f27; }
  .badge-완료 { background: #e1f5ee; color: #0f6e56; border: 0.5px solid #1d9e75; }
  .btn-edit { background: transparent; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 7px; padding: 3px 10px; font-size: 12px; color: #888780; font-family: inherit; flex-shrink: 0; margin-top: 1px; }
  body.dark .btn-edit { border-color: rgba(255,255,255,0.12); }
  .btn-del { background: transparent; border: none; font-size: 18px; color: #888780; line-height: 1; padding: 4px; flex-shrink: 0; }
  .btn-del:hover { color: #e24b4a; }
  .empty { text-align: center; color: #888780; padding: 2rem; font-size: 14px; }
  .connecting { text-align: center; color: #888780; padding: 3rem; font-size: 14px; }

  /* 기록 탭 */
  #historyPage { display: none; }
  .history-filter-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .hf-btn { padding: 5px 16px; border-radius: 99px; font-size: 13px; border: 0.5px solid rgba(0,0,0,0.1); background: #fff; color: #888780; font-family: inherit; cursor: pointer; }
  body.dark .hf-btn { background: #242424; border-color: rgba(255,255,255,0.1); }
  .hf-btn.active { background: #3b6d11; color: #fff; border-color: #3b6d11; font-weight: 500; }
  .hf-period { margin-left: auto; display: flex; gap: 6px; }
  .hp-btn { padding: 5px 14px; border-radius: 99px; font-size: 13px; border: 0.5px solid rgba(0,0,0,0.1); background: #fff; color: #888780; font-family: inherit; cursor: pointer; }
  body.dark .hp-btn { background: #242424; border-color: rgba(255,255,255,0.1); }
  .hp-btn.active { background: #2c2c2a; color: #fff; border-color: #2c2c2a; font-weight: 500; }
  body.dark .hp-btn.active { background: #e8e6df; color: #2c2c2a; }

  .history-date-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  body.dark .history-date-card { background: #242424; border-color: rgba(255,255,255,0.1); }
  .history-date-header { padding: 1rem 1.25rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .history-date-header:hover { background: rgba(0,0,0,0.02); }
  body.dark .history-date-header:hover { background: rgba(255,255,255,0.03); }
  .history-date-label { font-size: 15px; font-weight: 500; }
  .history-date-summary { display: flex; gap: 10px; align-items: center; }
  .history-pct-pill { font-size: 12px; padding: 2px 10px; border-radius: 99px; background: #eaf3de; color: #3b6d11; }
  .history-chevron { font-size: 12px; color: #888780; transition: transform 0.2s; display: inline-block; }
  .history-chevron.open { transform: rotate(180deg); }
  .history-subtabs { display: none; border-top: 0.5px solid rgba(0,0,0,0.06); }
  body.dark .history-subtabs { border-color: rgba(255,255,255,0.06); }
  .history-subtabs.open { display: block; }
  .history-subtab-header { display: flex; gap: 0; padding: 0.75rem 1.25rem 0; }
  .h-stab { padding: 5px 16px; border-radius: 8px 8px 0 0; font-size: 13px; border: 0.5px solid rgba(0,0,0,0.08); border-bottom: none; background: #f9f8f5; color: #888780; cursor: pointer; font-family: inherit; }
  body.dark .h-stab { background: #1a1a1a; border-color: rgba(255,255,255,0.08); }
  .h-stab.active-day { background: #e6f1fb; color: #185fa5; font-weight: 500; }
  .h-stab.active-night { background: #eeedfe; color: #533ab7; font-weight: 500; }
  .history-table-wrap { padding: 0.75rem 1.25rem 1rem; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .history-table th { text-align: left; color: #888780; font-weight: 400; padding: 6px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  body.dark .history-table th { border-color: rgba(255,255,255,0.08); }
  .history-table td { padding: 7px 8px; border-bottom: 0.5px solid rgba(0,0,0,0.05); color: #2c2c2a; vertical-align: middle; }
  body.dark .history-table td { border-color: rgba(255,255,255,0.05); color: #e8e6df; }
  .history-table tr:last-child td { border-bottom: none; }
  .h-badge-prog { font-size: 11px; padding: 2px 7px; border-radius: 99px; background: #faeeda; color: #854f0b; margin-right: 3px; display: inline-block; }
  .h-badge-done { font-size: 11px; padding: 2px 7px; border-radius: 99px; background: #e1f5ee; color: #0f6e56; display: inline-block; }
  .h-badge-done-night { font-size: 11px; padding: 2px 7px; border-radius: 99px; background: #eeedfe; color: #3c3489; display: inline-block; }
  .h-badge-none { font-size: 11px; padding: 2px 7px; border-radius: 99px; background: #f1efe8; color: #888780; display: inline-block; }
  .history-empty { text-align: center; color: #888780; padding: 3rem; font-size: 14px; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .tab-btn { padding: 8px 14px; font-size: 13px; }
    .hf-period { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- 버전 히스토리 팝업 -->
<div class="ver-modal-bg" id="verModalBg" onclick="if(event.target===this)closeVerModal()">
  <div class="ver-modal">
    <h2>업데이트 히스토리</h2>
    <table class="ver-table">
      <thead><tr><th>버전</th><th>날짜</th><th>내용</th></tr></thead>
      <tbody>
        <tr>
          <td><span class="ver-badge">v1.0</span></td>
          <td style="white-space:nowrap;color:#888780">2026-04-13</td>
          <td>최초 배포 — 주간/야간 체크리스트, 실시간 공유, 기록 보기, 버전 관리</td>
        </tr>
      </tbody>
    </table>
    <button class="ver-close" onclick="closeVerModal()">닫기</button>
  </div>
</div>

<!-- 업데이트 배너 -->
<div class="update-banner hidden" id="updateBanner">
  <span>새 버전이 있습니다!</span>
  <div>
    <a href="https://akali-eng.github.io/ops-checklist/" target="_blank">페이지 새로고침</a>
    <a href="https://raw.githubusercontent.com/akali-eng/ops-checklist/refs/heads/main/index.html" download="업무확인.html">최신버전 다운로드</a>
  </div>
</div>

<!-- Name Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>이름을 입력해 주세요</h2>
    <p>체크 시 이름이 표시됩니다. 한 번만 입력하면 기억됩니다.</p>
    <input type="text" id="nameInput" placeholder="예) 홍길동" maxlength="10" onkeydown="if(event.key==='Enter') saveName()">
    <button class="modal-btn" onclick="saveName()">확인</button>
  </div>
</div>

<!-- Tab -->
<div class="tab-switch">
  <button class="tab-btn day active" onclick="switchTab('day')">주간</button>
  <button class="tab-btn night" onclick="switchTab('night')">야간</button>
  <button class="tab-btn history" onclick="switchTab('history')">기록 보기</button>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h1 id="pageTitle">주간 업무 확인</h1>
    <div class="subdate" id="dateLabel"></div>
    <div class="username-tag" id="usernameTag" onclick="changeName()"></div>
  </div>
  <div class="header-right">
    <div class="version-info">
      <span style="cursor:pointer;text-decoration:underline;color:#185fa5" onclick="openVerModal()">v<span id="currentVer">1.0</span></span>
      · 업데이트 2026-04-13
      &nbsp;|&nbsp;
      <a href="https://raw.githubusercontent.com/akali-eng/ops-checklist/refs/heads/main/index.html" download="업무확인.html">최신버전 다운로드</a>
    </div>
    <div class="header-btns">
      <button class="btn-dark" onclick="toggleDark()">다크</button>
      <button class="btn-reset" id="btnReset" onclick="resetCheck()">체크 초기화</button>
      <button id="btnAdd" class="btn-add-day" onclick="toggleForm()">+ 항목 추가</button>
    </div>
  </div>
</div>

<!-- Add Form -->
<div class="add-form" id="addForm">
  <label>새 업무 항목</label>
  <input type="text" id="newText" placeholder="업무 내용 입력..." onkeydown="formKey(event)">
  <div class="add-form-btns">
    <button class="btn-cancel" onclick="toggleForm()">취소</button>
    <button id="btnSave" class="btn-save-day" onclick="addTodo()">추가</button>
  </div>
</div>

<!-- 업무 페이지 -->
<div id="todoPage">
  <div class="stats">
    <div class="stat-card"><div class="stat-label">전체</div><div class="stat-value" id="s-total" style="color:#378add">0</div></div>
    <div class="stat-card"><div class="stat-label">미확인</div><div class="stat-value" id="s-none" style="color:#888780">0</div></div>
    <div class="stat-card"><div class="stat-label">진행 중</div><div class="stat-value" id="s-prog" style="color:#ef9f27">0</div></div>
    <div class="stat-card"><div class="stat-label">완료</div><div class="stat-value" id="s-done">0</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-header"><span>완료율</span><span class="pct" id="pctLabel">0%</span></div>
    <div class="progress-bar-bg"><div class="progress-bar bar-day" id="progressBar" style="width:0%"></div></div>
  </div>
  <div class="filters">
    <button class="filter-btn active-day" onclick="setFilter('전체',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('미확인',this)">미확인</button>
    <button class="filter-btn" onclick="setFilter('진행',this)">진행</button>
    <button class="filter-btn" onclick="setFilter('완료',this)">완료</button>
  </div>
  <div class="todo-list" id="todoList"><div class="connecting">Firebase 연결 중...</div></div>
</div>

<!-- 기록 페이지 -->
<div id="historyPage">
  <div class="history-filter-row">
    <button class="hf-btn active" onclick="setHistoryTab('전체',this)">전체</button>
    <button class="hf-btn" onclick="setHistoryTab('day',this)">주간만</button>
    <button class="hf-btn" onclick="setHistoryTab('night',this)">야간만</button>
    <div class="hf-period">
      <button class="hp-btn active" onclick="setPeriod(7,this)">7일</button>
      <button class="hp-btn" onclick="setPeriod(30,this)">30일</button>
      <button class="hp-btn" onclick="setPeriod(0,this)">전체</button>
    </div>
  </div>
  <div id="historyList"><div class="history-empty">기록을 불러오는 중...</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDkJl0SSmXbcCeGSWY-lvjkKbeLeXxujw8",
  authDomain: "ops-checklist-e9790.firebaseapp.com",
  databaseURL: "https://ops-checklist-e9790-default-rtdb.firebaseio.com",
  projectId: "ops-checklist-e9790",
  storageBucket: "ops-checklist-e9790.firebasestorage.app",
  messagingSenderId: "923814810991",
  appId: "1:923814810991:web:1573a40b46d8657f68c49a"
};

const CURRENT_VERSION = "1.0"; // ← 업데이트 시 이 숫자를 올려주세요
const VERSION_URL = "https://raw.githubusercontent.com/akali-eng/ops-checklist/main/version.json";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const DAY_DEFAULTS = [
  "인수인계 확인","웹 방치건 확인","컨플루언스 인력 기입","호크아이 확인","인원 배치",
  "체크리스트 기입","배차건 확인","예상물량 및 프로모션 퀵사이트 확인",
  "전일자 미스토잉건, 재스토잉건 확인","내일~모레까지의 입고건 확인 (컨테이너 입고 또는 개별하역)",
  "내일~모레까지의 B2B건 확인","내일~모레까지의 임가공건 확인","인원 충원 필요 확인","로케이션 둘러보고 재고조회 하기"
];
const NIGHT_DEFAULTS = [
  "인수인계 확인","인원 배치","호크아이 확인","컨플루언스 인력 기입","체크리스트 기입",
  "웹 방치건 확인","간선 차량 대수 확인","예상물량 및 프로모션 퀵사이트 확인",
  "미스토잉, 재스토잉건 확인","재고-보충-상태값(승인) → 완료되지 않은 오래된 보충 확인",
  "내일~모레까지의 입고건 확인","내일~모레까지의 B2B건 확인","내일~모레까지의 임가공건 확인",
  "인원 충원 필요 확인","로케이션 둘러보고 재고조회 하기","배차 접수하기","자동출고지시 키고 퇴근"
];

// 05:00 기준 날짜
const now = new Date();
const cutoff = new Date(now); cutoff.setHours(5,0,0,0);
const baseDate = now < cutoff ? new Date(now.getTime() - 86400000) : now;
const today = baseDate.toISOString().split('T')[0];

let curTab = 'day', curFilter = '전체', historyTabFilter = '전체', periodDays = 7;
let myName = '', dragSrcId = null;
let todayData = { day: [], night: [] };
let allHistory = { day: {}, night: {} };

const CHK_SVG = `<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const DRAG_SVG = `<svg width="12" height="16" viewBox="0 0 12 16" fill="none"><circle cx="3" cy="3" r="1.5" fill="currentColor"/><circle cx="9" cy="3" r="1.5" fill="currentColor"/><circle cx="3" cy="8" r="1.5" fill="currentColor"/><circle cx="9" cy="8" r="1.5" fill="currentColor"/><circle cx="3" cy="13" r="1.5" fill="currentColor"/><circle cx="9" cy="13" r="1.5" fill="currentColor"/></svg>`;

// 버전 체크
async function checkVersion() {
  try {
    const res = await fetch(VERSION_URL + '?t=' + Date.now());
    const data = await res.json();
    document.getElementById('currentVer').textContent = CURRENT_VERSION;
    if (data.version !== CURRENT_VERSION) {
      document.getElementById('updateBanner').classList.remove('hidden');
    }
  } catch(e) {}
}

// 이름
window.saveName = function() {
  const v = document.getElementById('nameInput').value.trim();
  if (!v) return;
  myName = v;
  localStorage.setItem('ops-username', v);
  document.getElementById('modalBg').style.display = 'none';
  document.getElementById('usernameTag').textContent = '접속자: ' + myName + ' (클릭하여 변경)';
};
window.changeName = function() {
  document.getElementById('nameInput').value = myName;
  document.getElementById('modalBg').style.display = 'flex';
  setTimeout(() => document.getElementById('nameInput').focus(), 50);
};
function loadName() {
  myName = localStorage.getItem('ops-username') || '';
  if (!myName) document.getElementById('modalBg').style.display = 'flex';
  else { document.getElementById('modalBg').style.display = 'none'; document.getElementById('usernameTag').textContent = '접속자: ' + myName + ' (클릭하여 변경)'; }
}

function getStatus(t) {
  if (t.doneBy) return '완료';
  if (t.progBy && Object.keys(t.progBy).length > 0) return '진행';
  return '미확인';
}

function initDefaults(tab) {
  const defs = tab === 'day' ? DAY_DEFAULTS : NIGHT_DEFAULTS;
  const obj = {};
  defs.forEach((text, i) => { const id = `${tab}-${i+1}`; obj[id] = { id, text, order: i, progBy: {}, doneBy: null }; });
  set(ref(db, `todos/${tab}/${today}`), obj);
}

function listenToday(tab) {
  onValue(ref(db, `todos/${tab}/${today}`), snap => {
    const val = snap.val();
    if (!val) { initDefaults(tab); return; }
    todayData[tab] = Object.values(val).sort((a,b) => (a.order||0)-(b.order||0));
    if (curTab === tab) render();
  });
}

function listenHistory() {
  ['day','night'].forEach(tab => {
    onValue(ref(db, `todos/${tab}`), snap => {
      allHistory[tab] = snap.val() || {};
      if (curTab === 'history') renderHistory();
    });
  });
}

window.toggleProg = function(id) {
  if (!myName) { alert('이름을 먼저 입력해 주세요.'); return; }
  const t = todayData[curTab].find(x => x.id === id);
  if (!t || t.doneBy) return;
  const k = myName.replace(/[.#$[\]]/g, '_');
  const pb = t.progBy || {};
  if (pb[k]) remove(ref(db, `todos/${curTab}/${today}/${id}/progBy/${k}`));
  else update(ref(db, `todos/${curTab}/${today}/${id}/progBy`), { [k]: myName });
};

window.toggleDone = function(id) {
  if (!myName) { alert('이름을 먼저 입력해 주세요.'); return; }
  const t = todayData[curTab].find(x => x.id === id);
  if (!t) return;
  if (t.doneBy && t.doneBy !== myName) { alert(`'${t.doneBy}'님이 이미 완료 처리했습니다.`); return; }
  update(ref(db, `todos/${curTab}/${today}/${id}`), { doneBy: t.doneBy === myName ? null : myName });
};

window.resetCheck = function() {
  if (!confirm('현재 탭의 모든 체크를 초기화할까요?')) return;
  const updates = {};
  todayData[curTab].forEach(t => { updates[`todos/${curTab}/${today}/${t.id}/progBy`] = {}; updates[`todos/${curTab}/${today}/${t.id}/doneBy`] = null; });
  update(ref(db), updates);
};

window.addTodo = function() {
  const text = document.getElementById('newText').value.trim();
  if (!text) return;
  const id = `${curTab}-custom-${Date.now()}`;
  set(ref(db, `todos/${curTab}/${today}/${id}`), { id, text, order: todayData[curTab].length, progBy: {}, doneBy: null });
  document.getElementById('newText').value = ''; toggleForm();
};

window.removeTodo = function(id) {
  if (!confirm('항목을 삭제할까요?')) return;
  remove(ref(db, `todos/${curTab}/${today}/${id}`));
};

window.startEdit = function(id) {
  const t = todayData[curTab].find(x => x.id === id); if (!t) return;
  const el = document.getElementById('text-' + id);
  el.innerHTML = `<input class="todo-text-input" id="ei-${id}" value="${t.text.replace(/"/g,'&quot;')}" onblur="saveEdit('${id}')" onkeydown="editKey(event,'${id}')">`;
  document.getElementById('ei-' + id).focus();
};
window.saveEdit = function(id) {
  const inp = document.getElementById('ei-' + id); if (!inp) return;
  const val = inp.value.trim();
  if (val) update(ref(db, `todos/${curTab}/${today}/${id}`), { text: val });
  else render();
};
window.editKey = function(e, id) { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') render(); };

window.dStart = function(e, id) { dragSrcId = id; e.dataTransfer.effectAllowed = 'move'; document.getElementById('item-'+id).classList.add('dragging'); };
window.dOver = function(e, id) {
  e.preventDefault();
  document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over-day','drag-over-night'));
  if (id !== dragSrcId) document.getElementById('item-'+id)?.classList.add('drag-over-'+curTab);
};
window.dDrop = function(e, targetId) {
  e.preventDefault();
  if (!dragSrcId || dragSrcId === targetId) return;
  const list = [...todayData[curTab]];
  const fi = list.findIndex(t => t.id === dragSrcId), ti = list.findIndex(t => t.id === targetId);
  const [m] = list.splice(fi,1); list.splice(ti,0,m);
  const updates = {};
  list.forEach((t,i) => { updates[`todos/${curTab}/${today}/${t.id}/order`] = i; });
  update(ref(db), updates); dragSrcId = null;
};
window.dEnd = function() { dragSrcId = null; document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('dragging','drag-over-day','drag-over-night')); };

window.switchTab = function(tab) {
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-btn.'+tab).classList.add('active');
  const isTodo = tab === 'day' || tab === 'night';
  document.getElementById('todoPage').style.display = isTodo ? 'block' : 'none';
  document.getElementById('historyPage').style.display = tab === 'history' ? 'block' : 'none';
  document.getElementById('btnReset').style.display = isTodo ? 'inline-block' : 'none';
  document.getElementById('btnAdd').style.display = isTodo ? 'inline-block' : 'none';
  document.getElementById('addForm').classList.remove('open');
  if (tab === 'history') {
    document.getElementById('pageTitle').textContent = '기록 보기';
    renderHistory();
  } else {
    const isDay = tab === 'day';
    document.getElementById('pageTitle').textContent = isDay ? '주간 업무 확인' : '야간 업무 확인';
    document.getElementById('btnAdd').className = isDay ? 'btn-add-day' : 'btn-add-night';
    document.getElementById('btnSave').className = isDay ? 'btn-save-day' : 'btn-save-night';
    document.getElementById('progressBar').className = 'progress-bar '+(isDay?'bar-day':'bar-night');
    document.getElementById('s-done').style.color = isDay ? '#1d9e75' : '#7f77dd';
    curFilter = '전체'; resetFilters(); render();
  }
};

window.toggleDark = function() {
  document.body.classList.toggle('dark');
  document.querySelector('.btn-dark').textContent = document.body.classList.contains('dark') ? '라이트' : '다크';
};
window.toggleForm = function() {
  const f = document.getElementById('addForm'); f.classList.toggle('open');
  if (f.classList.contains('open')) { document.getElementById('newText').value = ''; document.getElementById('newText').focus(); }
};
window.formKey = function(e) { if (e.key==='Enter') addTodo(); if (e.key==='Escape') toggleForm(); };

function resetFilters() {
  document.querySelectorAll('.filter-btn').forEach((b,i) => { b.className = 'filter-btn'+(i===0?' active-'+curTab:''); });
}
window.setFilter = function(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-day','active-night'));
  btn.classList.add('active-'+curTab); render();
};
window.setHistoryTab = function(f, btn) {
  historyTabFilter = f;
  document.querySelectorAll('.hf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderHistory();
};
window.setPeriod = function(days, btn) {
  periodDays = days;
  document.querySelectorAll('.hp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderHistory();
};
window.toggleHistorySubtab = function(date, tab) {
  const wrap = document.getElementById('htable-'+date);
  document.getElementById('hstab-day-'+date)?.classList.remove('active-day');
  document.getElementById('hstab-night-'+date)?.classList.remove('active-night');
  if (tab==='day') document.getElementById('hstab-day-'+date)?.classList.add('active-day');
  else document.getElementById('hstab-night-'+date)?.classList.add('active-night');
  if (wrap) wrap.innerHTML = buildTableRows(date, tab);
};

function buildTableRows(date, tab) {
  const d = allHistory[tab][date];
  if (!d) return '<p style="color:#888780;font-size:13px;padding:8px 0">데이터 없음</p>';
  const items = Object.values(d).sort((a,b)=>(a.order||0)-(b.order||0));
  const rows = items.map((t,i) => {
    const progNames = t.progBy ? Object.values(t.progBy) : [];
    const doneName = t.doneBy || null;
    const pb = progNames.map(n=>`<span class="h-badge-prog">${n}</span>`).join('');
    const db2 = doneName ? `<span class="${tab==='day'?'h-badge-done':'h-badge-done-night'}">${doneName} 완료</span>` : '';
    const nb = !doneName && !progNames.length ? `<span class="h-badge-none">미확인</span>` : '';
    return `<tr><td style="color:#888780;width:24px">${i+1}</td><td>${t.text}</td><td style="white-space:nowrap">${pb}${db2}${nb}</td></tr>`;
  }).join('');
  return `<table class="history-table"><thead><tr><th>#</th><th>항목</th><th>처리 현황</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const dayDates = Object.keys(allHistory.day);
  const nightDates = Object.keys(allHistory.night);
  let allDates = [...new Set([...dayDates, ...nightDates])].sort().reverse();

  // 기간 필터
  if (periodDays > 0) {
    const cutoffDate = new Date(baseDate.getTime() - (periodDays-1)*86400000).toISOString().split('T')[0];
    allDates = allDates.filter(d => d >= cutoffDate);
  }
  if (historyTabFilter === 'day') allDates = allDates.filter(d => allHistory.day[d]);
  if (historyTabFilter === 'night') allDates = allDates.filter(d => allHistory.night[d]);

  if (!allDates.length) { list.innerHTML = '<div class="history-empty">해당 기간에 기록이 없습니다</div>'; return; }

  list.innerHTML = allDates.map(date => {
    const hasDay = !!allHistory.day[date] && historyTabFilter !== 'night';
    const hasNight = !!allHistory.night[date] && historyTabFilter !== 'day';
    let totalAll = 0, doneAll = 0;
    ['day','night'].forEach(tab => {
      const d = allHistory[tab][date]; if (!d) return;
      const items = Object.values(d);
      totalAll += items.length; doneAll += items.filter(t=>t.doneBy).length;
    });
    const pct = totalAll ? Math.round(doneAll/totalAll*100) : 0;
    const defaultTab = hasDay ? 'day' : 'night';
    const dateLabel = date === today ? `${date} (오늘)` : date;
    const subtabBtns = [
      hasDay ? `<button class="h-stab ${defaultTab==='day'?'active-day':''}" id="hstab-day-${date}" onclick="toggleHistorySubtab('${date}','day')">주간</button>` : '',
      hasNight ? `<button class="h-stab ${defaultTab==='night'&&!hasDay?'active-night':''}" id="hstab-night-${date}" onclick="toggleHistorySubtab('${date}','night')">야간</button>` : ''
    ].join('');
    return `<div class="history-date-card">
      <div class="history-date-header" onclick="this.querySelector('.history-chevron').classList.toggle('open');this.nextSibling.classList.toggle('open');">
        <span class="history-date-label">${dateLabel}</span>
        <div class="history-date-summary">
          <span class="history-pct-pill">완료 ${doneAll}/${totalAll} · ${pct}%</span>
          <span class="history-chevron">▾</span>
        </div>
      </div>
      <div class="history-subtabs">
        <div class="history-subtab-header">${subtabBtns}</div>
        <div class="history-table-wrap" id="htable-${date}">${buildTableRows(date, defaultTab)}</div>
      </div>
    </div>`;
  }).join('');
}

function updateStats(todos) {
  const total=todos.length, none=todos.filter(t=>getStatus(t)==='미확인').length,
        prog=todos.filter(t=>getStatus(t)==='진행').length, done=todos.filter(t=>getStatus(t)==='완료').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-none').textContent=none;
  document.getElementById('s-prog').textContent=prog;
  document.getElementById('s-done').textContent=done;
  document.getElementById('pctLabel').textContent=pct+'%';
  document.getElementById('progressBar').style.width=pct+'%';
}

function render() {
  const todos = todayData[curTab]||[];
  updateStats(todos);
  const filtered = curFilter==='전체' ? todos : todos.filter(t=>getStatus(t)===curFilter);
  const list = document.getElementById('todoList');
  if (!filtered.length) { list.innerHTML='<div class="empty">항목이 없습니다</div>'; return; }
  list.innerHTML = filtered.map(t => {
    const status=getStatus(t), idx=todos.findIndex(x=>x.id===t.id)+1;
    const progNames=t.progBy?Object.values(t.progBy):[];
    const isDone=status==='완료', isMyDone=t.doneBy===myName;
    const progChecked=progNames.includes(myName)||isDone, doneDisabled=isDone&&!isMyDone;
    const nameTags=[
      ...progNames.map(n=>`<span class="name-tag name-tag-prog">${n} 진행</span>`),
      ...(t.doneBy?[`<span class="name-tag ${curTab==='day'?'name-tag-done':'name-tag-done-night'}">${t.doneBy} 완료</span>`]:[])
    ].join('');
    return `<div class="todo-item" id="item-${t.id}" draggable="true"
        ondragstart="dStart(event,'${t.id}')" ondragover="dOver(event,'${t.id}')" ondrop="dDrop(event,'${t.id}')" ondragend="dEnd()">
      <div class="drag-handle">${DRAG_SVG}</div>
      <div class="todo-num">${idx}</div>
      <div class="todo-main">
        <div class="todo-text ${isDone?'done':''}" id="text-${t.id}" ondblclick="startEdit('${t.id}')">${t.text}</div>
        <div class="todo-names">${nameTags}</div>
      </div>
      <div class="status-badge badge-${status}">${status}</div>
      <div class="checkboxes">
        <div class="chk-wrap">
          <div class="chk-box ${progChecked?'chk-prog':''}" onclick="toggleProg('${t.id}')">${progChecked?CHK_SVG:''}</div>
          <span>진행</span>
        </div>
        <div class="chk-wrap">
          <div class="chk-box ${isDone?(curTab==='day'?'chk-done-day':'chk-done-night'):''} ${doneDisabled?'disabled':''}" onclick="toggleDone('${t.id}')">${isDone?CHK_SVG:''}</div>
          <span>완료</span>
        </div>
      </div>
      <button class="btn-edit" onclick="startEdit('${t.id}')">수정</button>
      <button class="btn-del" onclick="removeTodo('${t.id}')">×</button>
    </div>`;
  }).join('');
}

window.openVerModal = function() { document.getElementById('verModalBg').classList.add('open'); };
